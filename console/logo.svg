<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" role="img" aria-label="ComfyConnect VPN">
  <defs>
    <linearGradient id="cc-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1E5EFF"/>
      <stop offset="1" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>
  <!-- mark: two interlocking connection nodes inside a soft shield -->
  <g transform="translate(4,4)">
    <rect x="0" y="0" width="40" height="40" rx="11" fill="url(#cc-g)"/>
    <circle cx="14" cy="20" r="5" fill="#fff"/>
    <circle cx="26" cy="20" r="5" fill="#fff" opacity="0.85"/>
    <rect x="13" y="18.3" width="14" height="3.4" rx="1.7" fill="#fff"/>
  </g>
  <!-- wordmark -->
  <text x="54" y="31" font-family="'Segoe UI',system-ui,-apple-system,Arial,sans-serif" font-size="21" font-weight="700" fill="currentColor" letter-spacing="-0.3">
    Comfy<tspan fill="#14B8A6">Connect</tspan>
  </text>
</svg>
